# ── api.palato.mv ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.palato.mv;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.palato.mv;

    ssl_certificate     /etc/letsencrypt/live/api.palato.mv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.palato.mv/privkey.pem;

    root /var/www/public;
    index index.php;

    # Max upload size for photos
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.ht { deny all; }

    # CORS for frontend
    add_header Access-Control-Allow-Origin  "https://app.palato.mv" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = 'OPTIONS') { return 204; }
}

# ── app.palato.mv ──────────────────────────────────────────────────
server {
    listen 80;
    server_name app.palato.mv;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name app.palato.mv;

    ssl_certificate     /etc/letsencrypt/live/app.palato.mv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.palato.mv/privkey.pem;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
